<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupero Password - Punteggiometro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scout: { 50: '#f2fcf5', 500: '#36a772', 600: '#26865a', 700: '#206b4a', 800: '#1d553d' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-scout-50 to-green-100 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full space-y-6 glass p-8 rounded-xl shadow-lg">
        <div class="text-center">
            <h2 class="mt-2 text-3xl font-extrabold text-scout-800">
                Setup o Recupero <br> Password
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                Inserisci il tuo indirizzo email. Se è associato a un account, ti invieremo un link per impostare una nuova password.
            </p>
        </div>

        <form class="mt-6 space-y-6" action="/password-reset-request" method="POST">
            <div>
                <label for="email" class="sr-only">Email</label>
                <input id="email" name="email" type="email" required
                    class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-scout-500 focus:border-scout-500 focus:z-10 sm:text-sm bg-white/90"
                    placeholder="Indirizzo Email">
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-scout-600 hover:bg-scout-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-scout-500 transition-colors shadow-md">
                    Invia Link di Recupero
                </button>
            </div>
            
            {% if success %}
            <div class="text-green-700 bg-green-50 border border-green-200 p-3 rounded-md text-sm text-center font-bold mt-4">
                {{ success }}
            </div>
            {% endif %}

            <div class="text-sm text-center mt-4">
                <a href="/login" class="font-medium text-scout-600 hover:text-scout-500">
                    Torna al Login
                </a>
            </div>
        </form>
    </div>
</body>

</html>
